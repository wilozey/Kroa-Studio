document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"><\u002Fspan>\n        <span style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;letter-spacing:-0.02em\">KROA<\u002Fspan>\n        <span style=\"font-size:11px;letter-spacing:0.28em;color:#8E8E96;font-weight:500;margin-top:2px\">STUDIO<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"color:#8E8E96;font-size:14px;line-height:1.6;margin:16px 0 0;max-width:34ch\">The AI-native operating system for music careers. Distribution, royalties, rights, marketing and creative — in one place.<\u002Fp>\n    <\u002Fdiv>\n    <sc-for list=\"{{ footCols }}\" as=\"col\" hint-placeholder-count=\"3\">\n      <div>\n        <div style=\"font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#6E6E76;font-weight:600\">{{ col.head }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;margin-top:16px\">\n          <sc-for list=\"{{ col.links }}\" as=\"l\" hint-placeholder-count=\"4\">\n            <a href=\"#top\" style=\"color:#B9B9C0;font-size:14.5px\" style-hover=\"{{ hoverLink }}\">{{ l }}<\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;padding-top:24px\">\n    <span style=\"color:#6E6E76;font-size:13px\">© 2026 KROA Studio. All rights reserved.<\u002Fspan>\n    <span style=\"color:#6E6E76;font-size:13px\">Made for independent artists everywhere.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    // animated equalizer (kept as element so animation survives re-render)\n    const bars = [];\n    for (let i = 0; i < 72; i++) {\n      const h = 8 + Math.round(78 * Math.pow(Math.abs(Math.sin(i * 0.5 + 1)), 1.25));\n      const d = ((i * 0.09) % 1.5).toFixed(2);\n      bars.push(React.createElement('span', { key: i, style: {\n        display: 'block', width: '5px', borderRadius: '3px', height: h + 'px',\n        background: 'linear-gradient(180deg,#CCFF00 0%,#7C5CFF 100%)', opacity: 0.9,\n        animation: 'eq 1.3s ease-in-out infinite', animationDelay: d + 's', transformOrigin: 'bottom'\n      } }));\n    }\n    const equalizer = React.createElement('div', { style: {\n      display: 'flex', alignItems: 'flex-end', justifyContent: 'center', gap: '4px', height: '96px', width: '100%'\n    } }, bars);\n\n    const hoverLink = { color: '#ECEBE6' };\n    const hoverBtn = { transform: 'translateY(-2px)', filter: 'brightness(1.05)' };\n    const hoverGhost = { background: 'rgba(255,255,255,0.1)', borderColor: 'rgba(255,255,255,0.24)' };\n    const hoverCard = { borderColor: 'rgba(255,255,255,0.2)', transform: 'translateY(-4px)', transition: 'transform .3s, border-color .3s' };\n    const hoverChip = { borderColor: 'rgba(255,255,255,0.28)', color: '#ECEBE6' };\n\n    const chartHeights = [42, 55, 48, 63, 58, 72, 68, 84, 79, 92, 88, 100];\n    const months = ['J','F','M','A','M','J','J','A','S','O','N','D'];\n    const chart = chartHeights.map((v, i) => ({\n      m: months[i], h: v + '%',\n      bg: i >= 10 ? 'linear-gradient(180deg,#CCFF00,#7C5CFF)' : 'rgba(255,255,255,0.14)'\n    }));\n\n    const platforms = [\n      { name: 'Spotify', pct: '42%', w: '42%' },\n      { name: 'Apple Music', pct: '24%', w: '24%' },\n      { name: 'YouTube', pct: '16%', w: '16%' },\n      { name: 'TikTok', pct: '11%', w: '11%' },\n      { name: 'Others', pct: '7%', w: '7%' }\n    ];\n\n    const baseCard = 'position:relative;padding:32px 28px;border-radius:22px;display:flex;flex-direction:column;';\n    const mkBtn = (bg, color, extra) => 'display:block;text-align:center;margin-top:26px;font-size:15px;font-weight:600;padding:14px;border-radius:999px;background:' + bg + ';color:' + color + ';' + (extra || '');\n\n    const tiers = [\n      {\n        name: 'Indie', price: '$0', per: 'forever',\n        desc: 'Everything you need to release your first records.',\n        features: ['Distribution to 150+ stores', 'Keep 90% of your royalties', 'Real-time streaming analytics', '3 AI artwork generations / month', 'Basic fan hub'],\n        highlight: false, check: '#8E8E96',\n        card: baseCard + 'border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.02);',\n        btn: mkBtn('rgba(255,255,255,0.06)', '#ECEBE6', 'border:1px solid rgba(255,255,255,0.14);'),\n        btnHover: hoverGhost, cta: 'Start free'\n      },\n      {\n        name: 'Pro', price: '$19', per: '/ month',\n        desc: 'The full artist OS for career musicians.',\n        features: ['Unlimited releases — keep 100%', 'Full analytics & finance suite', 'KROA AI Studio, unlimited', 'Publishing & rights collection', 'Sync marketplace + smart splits'],\n        highlight: true, check: '#CCFF00',\n        card: baseCard + 'border:1px solid rgba(204,255,0,0.4);background:linear-gradient(180deg,rgba(204,255,0,0.07),rgba(255,255,255,0.01));box-shadow:0 20px 60px rgba(204,255,0,0.08);',\n        btn: mkBtn('#CCFF00', '#09090B', 'box-shadow:0 8px 24px rgba(204,255,0,0.28);'),\n        btnHover: hoverBtn, cta: 'Go Pro'\n      },\n      {\n        name: 'Label', price: '$49', per: '/ month',\n        desc: 'Run a full roster with white-label power.',\n        features: ['Everything in Pro', 'Unlimited artists & sub-accounts', 'White-label & full API access', 'Advanced rights + blockchain certs', 'Dedicated success manager'],\n        highlight: false, check: '#7C5CFF',\n        card: baseCard + 'border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.02);',\n        btn: mkBtn('rgba(124,92,255,0.16)', '#C7B8FF', 'border:1px solid rgba(124,92,255,0.5);'),\n        btnHover: { background: 'rgba(124,92,255,0.26)' }, cta: 'Talk to us'\n      }\n    ];\n\n    return {\n      equalizer,\n      hoverLink, hoverBtn, hoverGhost, hoverCard, hoverChip,\n      chart, platforms, tiers,\n      trust: ['AI-native', '150+ stores & platforms', 'Keep up to 100% royalties', 'No upfront cost'],\n      replaces: ['Record label', 'Distributor', 'Publisher', 'Marketing agency', 'AI creative studio', 'Royalty accountant', 'Fan club', 'Analytics suite', 'Business manager', 'Academy', 'Marketplace'],\n      modules: [\n        { n: '01', tag: 'Distribution', title: 'Intelligent distribution to everywhere', body: 'Ship singles, EPs, albums, podcasts, audiobooks and sample packs. AI validates metadata, checks artwork, analyses audio quality and schedules releases across every store and territory.', accent: '#CCFF00' },\n        { n: '02', tag: 'Analytics & Finance', title: 'Royalties and cash flow, in real time', body: 'Live dashboards for royalties, platform and country breakdowns, tax summaries and currency conversion — plus advances, projections, invoices and automatic split payments.', accent: '#41E5C6' },\n        { n: '03', tag: 'Publishing & Rights', title: 'Own exactly what is yours', body: 'Collect mechanical, performance, publishing and neighbouring royalties worldwide. Track splits and contracts, catch conflicts before release, and mint blockchain ownership certificates.', accent: '#FF6F91' },\n        { n: '04', tag: 'AI Studio', title: 'A creative studio and business manager', body: 'Generate artwork, lyrics, concepts, videos, visualisers and press kits. A conversational manager plans releases, reads your streams, estimates budgets and predicts trending genres.', accent: '#7C5CFF' },\n        { n: '05', tag: 'Fans & Marketing', title: 'Turn listeners into a community', body: 'Auto-build campaigns for TikTok, Instagram, YouTube and email. Run VIP fan hubs with exclusive content, badges, livestreams, digital collectibles and built-in crowdfunding.', accent: '#FFB020' },\n        { n: '06', tag: 'Marketplace & Sync', title: 'License, sell and get placed', body: 'A sync marketplace with mood, BPM and AI similarity search plus one-click contracts. Trade beats, loops and services, and sell print-on-demand merch with AI mockups.', accent: '#5AA9FF' },\n        { n: '07', tag: 'Academy & Hub', title: 'Level up and collaborate', body: 'Career-stage courses on branding, marketing, copyright, touring and finance — plus a collaboration hub to find and hire producers, designers and editors with secure sharing.', accent: '#C6F24E' }\n      ],\n      aiFeatures: [\n        'Artwork, lyrics, visualisers, videos & EPKs generated on demand',\n        'Conversational manager that reads your data and acts',\n        'Trend prediction and collaboration suggestions',\n        'AI mastering, stem separation and multilingual dubbing'\n      ],\n      roles: ['Independent artists', 'Bands & duos', 'Producers', 'Beat makers', 'Songwriters', 'Composers', 'DJs', 'Record labels', 'Podcasters', 'AI music creators', 'Managers', 'Booking agents', 'Playlist curators', 'Fans'],\n      footCols: [\n        { head: 'Platform', links: ['Distribution', 'Analytics', 'Publishing', 'AI Studio', 'Marketplace'] },\n        { head: 'Company', links: ['About', 'Careers', 'Blog', 'Press kit'] },\n        { head: 'Resources', links: ['Academy', 'Help centre', 'API docs', 'Contact'] }\n      ]\n    };\n  }\n\n  componentDidMount() {\n    const els = Array.from(document.querySelectorAll('[data-reveal]'));\n    els.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(26px)';\n      el.style.transition = 'opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1)';\n    });\n    const reveal = el => { el.style.opacity = '1'; el.style.transform = 'none'; };\n    if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach(e => { if (e.isIntersecting) { reveal(e.target); io.unobserve(e.target); } });\n      }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n      els.forEach(el => io.observe(el));\n      setTimeout(() => els.forEach(reveal), 2800);\n    } else {\n      els.forEach(reveal);\n    }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
